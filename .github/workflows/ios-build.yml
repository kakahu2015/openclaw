name: Build iOS IPA (Unsigned / Ad-hoc)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build configuration'
        required: false
        default: 'Debug'
        type: choice
        options:
          - Debug
          - Release

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Setup Xcode 26.2 (Swift 6.2)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Verify Swift version
        run: |
          swift --version
          xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install project dependencies
        run: pnpm install --frozen-lockfile

      - name: Install build tools
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Configure signing (ad-hoc / no team)
        working-directory: apps/ios
        run: |
          cat > LocalSigning.xcconfig << 'EOF'
          OPENCLAW_CODE_SIGN_STYLE = Manual
          OPENCLAW_DEVELOPMENT_TEAM =
          OPENCLAW_APP_BUNDLE_ID = ai.openclaw.client.local
          OPENCLAW_SHARE_BUNDLE_ID = ai.openclaw.client.local.share
          OPENCLAW_ACTIVITY_WIDGET_BUNDLE_ID = ai.openclaw.client.local.activitywidget
          OPENCLAW_WATCH_APP_BUNDLE_ID = ai.openclaw.client.local.watchkitapp
          OPENCLAW_WATCH_EXTENSION_BUNDLE_ID = ai.openclaw.client.local.watchkitapp.extension
          OPENCLAW_APP_PROFILE =
          OPENCLAW_SHARE_PROFILE =
          EOF

      - name: Build iOS app (xcodebuild)
        working-directory: apps/ios
        run: |
          xcodebuild clean build \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -destination 'generic/platform=iOS' \
            -configuration ${{ inputs.build_config }} \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$(pwd)/build"

      - name: Package IPA
        working-directory: apps/ios
        run: |
          APP_PATH="build/${{ inputs.build_config }}-iphoneos/OpenClaw.app"
          PAYLOAD_DIR="build/Payload"

          if [ ! -d "$APP_PATH" ]; then
            echo "❌ App not found at $APP_PATH"
            echo "Available files:"
            ls -la build/${{ inputs.build_config }}-iphoneos/ 2>/dev/null || echo "Build dir not found"
            exit 1
          fi

          mkdir -p "$PAYLOAD_DIR"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"
          cd build
          zip -r "OpenClaw-${{ inputs.build_config }}.ipa" Payload/
          echo "✅ IPA created: build/OpenClaw-${{ inputs.build_config }}.ipa"
          ls -lh "OpenClaw-${{ inputs.build_config }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-iOS-${{ inputs.build_config }}
          path: apps/ios/build/OpenClaw-${{ inputs.build_config }}.ipa
          retention-days: 30

      - name: Notify Telegram
        if: always()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          STATUS="${{ job.status }}"
          RUN_NUM="${{ github.run_number }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$STATUS" = "success" ]; then
            MSG="iOS build #$RUN_NUM 编译成功 ✅"
          else
            MSG="iOS build #$RUN_NUM 编译失败 ❌"
          fi
          MSG="$MSG
$URL"
          curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode "text=$MSG"
