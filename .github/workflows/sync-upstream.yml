name: Sync Fork
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
      - name: Sync upstream (preserve local workflows)
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream
          git checkout main
          # 备份本地 workflow 文件
          cp -r .github/workflows /tmp/my-workflows
          # 合并上游
          git merge upstream/main --no-edit || true
          # 用本地 workflow 覆盖（不同步上游 workflow 变更）
          rm -rf .github/workflows
          cp -r /tmp/my-workflows .github/workflows
          git add .github/workflows/
          git diff --cached --quiet || git commit -m "sync upstream (preserve local workflows)"
          git push origin main
      - name: Trigger iOS Build
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'kakahu2015',
              repo: 'openclaw',
              workflow_id: 'ios-build.yml',
              ref: 'main'
            })
            console.log('iOS build triggered');
