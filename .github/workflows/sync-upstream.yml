name: Sync Fork
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only || git merge upstream/main -m "auto sync with upstream"
          git push origin main
      - name: Trigger iOS Build
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'kakahu2015',
              repo: 'openclaw',
              workflow_id: 'ios-build.yml',
              ref: 'main'
            })
            console.log('iOS build triggered');
