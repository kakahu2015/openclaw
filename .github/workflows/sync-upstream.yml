name: Sync Fork
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.check.outputs.should_sync }}
      release_tag: ${{ steps.check.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Check latest release
        id: check
        run: |
          # 获取上游最新 release 发布日期
          RELEASE_DATE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/latest" \
            | jq -r '.published_at // empty')

          if [ -z "$RELEASE_DATE" ]; then
            echo "No release found, skip."
            echo "should_sync=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 判断是否是今天发布的（新加坡时间 GMT+8）
          RELEASE_DAY=$(TZ=Asia/Singapore date -d "$RELEASE_DATE" +%Y-%m-%d)
          TODAY=$(TZ=Asia/Singapore date +%Y-%m-%d)

          echo "Release date: $RELEASE_DAY, Today: $TODAY"

          if [ "$RELEASE_DAY" != "$TODAY" ]; then
            echo "No release today, skip."
            echo "should_sync=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 获取 release tag
          RELEASE_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openclaw/openclaw/releases/latest" \
            | jq -r '.tag_name // empty')
          echo "Release tag: $RELEASE_TAG"

          # 检查是否已经同步过这个版本
          LAST_SYNCED=""
          if [ -f .last-synced-version ]; then
            LAST_SYNCED=$(cat .last-synced-version)
          fi
          echo "Last synced: $LAST_SYNCED"

          if [ "$LAST_SYNCED" = "$RELEASE_TAG" ]; then
            echo "Already synced $RELEASE_TAG, skip."
            echo "should_sync=false" >> $GITHUB_OUTPUT
          else
            echo "New release $RELEASE_TAG, will sync."
            echo "should_sync=true" >> $GITHUB_OUTPUT
            echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          fi

  sync:
    needs: check-release
    if: needs.check-release.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
      - name: Sync upstream (preserve local workflows)
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream
          git checkout main
          # 备份本地 workflow 文件
          cp -r .github/workflows /tmp/my-workflows
          # 合并上游
          git merge upstream/main --no-edit || true
          # 用本地 workflow 覆盖（不同步上游 workflow 变更）
          rm -rf .github/workflows
          cp -r /tmp/my-workflows .github/workflows
          git add .github/workflows/
          # 更新同步标记
          echo "${{ needs.check-release.outputs.release_tag }}" > .last-synced-version
          git add .last-synced-version
          git diff --cached --quiet || git commit -m "sync upstream ${{ needs.check-release.outputs.release_tag }} (preserve local workflows)"
          git push origin main
      - name: Trigger iOS Build
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'kakahu2015',
              repo: 'openclaw',
              workflow_id: 'ios-build.yml',
              ref: 'main'
            })
            console.log('iOS build triggered');
