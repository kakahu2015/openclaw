name: iOS Build Notify
on:
  workflow_run:
    workflows: ["Build iOS IPA (Unsigned / Ad-hoc)"]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.event == 'workflow_dispatch' || github.event.workflow_run.event == 'workflow_run' }}
    steps:
      - name: Notify result
        env:
          STATUS: ${{ github.event.workflow_run.conclusion }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          HTML_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          if [ "$STATUS" = "success" ]; then
            MSG="iOS build #$RUN_NUMBER 编译成功 ✅ $HTML_URL"
          elif [ "$STATUS" = "failure" ]; then
            MSG="iOS build #$RUN_NUMBER 编译失败 ❌ $HTML_URL"
          else
            echo "Status: $STATUS, skip"
            exit 0
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TG_CHAT_ID }}" \
            -d text="$MSG"
